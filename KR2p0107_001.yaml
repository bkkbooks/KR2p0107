body:
  text: 武威漢簡乙本服傳釋文斬衰常苴絰杖絞帶冠繩纓菅屢者斬者不䌌也苴絰麻之有賁者也苴絰大鬲左本在下去五分一以為帶資衰之絰斬衰之帶也去五分一以為帶大功之絰資衰之帶也去五分一以為帶小功之絰大功之帶也去五分一以為帶緦麻之絰小功之帶也去五分一以為帶苴杖竹也削杖桐也長各齊其心皆下本而杖者何也爵也無爵而杖者何也儋主也非而不杖者何也輔病也童子何以不杖也不能病也婦人何以不杖也不能病也絞帶者繩帶也繩纓屬冠六升外縪段而勿灰衰三升菅屢者菅菲也外納居倚廬寖菌枕塊哭晝夜無時吹粥朝一洫米夕一洫米寢不說絰帶既虞剪屏柱楣寢有席食疏食水飲朝一哭夕一哭而已矣既練舍外寢始食菜果反素食哭無時為父何以斬衰也至尊也天子至尊也君至尊也父為長子何以三年也正𦡊乎上又乃將所傳重也庶子不得為長子三年不繼祖也為人後者何以三年也受重者必以尊服之何如而可為後同宗則為之後何如而可以為人後支子可為所為後祖父母妻之父母昆弟之子若子衆臣杖不敢即位近臣君服斯服矣妻為夫至尊也妾為君至尊也女子在室為父布總朁枅衰三年傳曰總六升長六寸晉枅長尺吉枅尺二寸繩屢者繩菲也衆臣者何也曰公卿大夫室老士貴臣其餘皆衆臣也有地者也疏衰常資牡麻絰冠布纓削杖布帶疏屢三年者資者䌌也牡麻者恃麻也牡麻絰右本在上冠者古功也疏屢者類之菲也繼母如母繼母何以如母也繼母之配父與因母同故孝子弗敢殊也慈母如母慈母者何也傳曰妾之毋子者妾子之毋母者也父命妾曰女以為子命子曰女以為母若是則生養之終其身如母死喪之三年如母貴父之命也母為長子何以三年也父之所不降母亦不敢降也疏衰常資牡麻絰冠布纓削杖布帶疏屢基者問者曰何冠也資衰大功冠其綬緦小功冠其衰帶緣各視其冠父在為母何以基也詘也至尊在不敢降其私尊也父必三年然后娶達子之志也為妻何以基也妻至親也出妻之子為母基為外祖父母無服傳曰絶族無易服親者屬出妻之子為父後則為出母無服傳曰與尊者為體不敢服其私親也父卒繼母嫁從為之服報何以也貴終也不杖麻屢者祖父母何以基也尊也世父叔父何以基也與尊者一體也然則為昆弟之子何以亦基也旁尊也不足以加尊焉故報之也父子一體也夫妻一體也昆弟一體也故父子首足也夫妻辨合也昆弟四體也故昆弟之義無分然而有分者則辟子之私也子不私父則不成為子故有東宮有西宮有南宮有北宮異居而同財有餘則歸之宗不足則資於宗世母叔母何以基也以名服也夫之昆弟之子何以亦基也報之也大夫之適子為妻何以基也父之所不降子亦不敢降也何以不杖也父在則為妻不杖大夫之庶子為適昆弟何以基也父之所不降子亦不敢降也適孫何以基也不降其適也有適子者毋適孫婦亦如之為人後者為其父母何以基也不二斬也何以不二斬也持重於大宗者降其小宗也為人後者孰後也後大宗也曷為後大宗也尊之統也禽獸知母而不知父野人曰父母何選焉都邑之士則知尊璽矣大夫及學士則知尊祖矣諸侯及其大祖天子及其始祖之所自出尊者尊統上卑者尊統下大宗者尊之統也大宗者收族者也不可以絶故族以支子後大宗適子不得後大宗女子子適人者為其父母昆弟之為父後者為父何以基也婦人不二斬也者何也婦人有三從之義無專用道之行故未嫁從父既嫁從夫死從子為昆弟之為父後者何以基也婦人雖在外必歸宗曰小宗故服基也父者子之天也夫者妻之天也婦人不二斬者猶曰不二天也婦人不能二尊也繼父同居者何以基也傳曰夫死妻稚子幼子無大功之親與之適人所適者亦無大功之親所適者以其貨財為之築宮廟歲時使之祀焉妻不敢與焉若是則繼父之道也同居則資衰基異居則資衰三月必嘗同居然后為異居未嘗同居不為異居為夫之君何以基也從服也姑姊妹女子適人無主者無祭主也何以基也為其無祭主也為君之父母妻長子祖父母何以基也從服也父母長子君服斬妻則小君也父卒然后為祖後者服斬妾為女君何以基也妾之事女君與婦之事咎姑等婦為咎姑何以基也從服也公妾大夫之妾為其子何以基也妾不得𦡊君為其子得遂也女子子為祖父母何以基也不敢降其祖也大夫之子為世父母叔父母子昆弟之子姑姊妹女子無主為大夫命婦者唯子不報大夫者其男子之為大夫者也命婦者其婦人之為大夫妻者也無主者命婦之無祭主者也何以言唯子不報也女子適人者為父母基故不言報也言其餘皆報也何以服基也父之所不降子亦不敢降也大夫曷為不降命婦也夫貴於朝則妻亦貴於室矣大夫為祖父母適孫為士者何以基也大夫不敢降其祖適也公妾以及士妾為其父母何以基也妾不得體君得為其父母遂疏衰常資牡麻絰無綬者寄公為所禺寄公者何也失地之君也何以為所禺服資衰三月也言與民同也丈夫婦人為宗子之母妻何以服資衰三月也尊祖也尊祖故敬宗尊祖之義也宗子之母在則不為宗子之妻服為舊君之母妻為舊君者孰胃也士焉而已者何以服資衰三月也言與民同也君之母妻則小君也大夫在外其妻長子為舊國君何以服資衰三月也妻言與民同也長子言未去也曾祖父母何以服資衰三月也小功者兄弟之服也不敢以兄弟之服尊者也大夫為宗子何以服資衰三月也大夫不敢降其宗也大夫為舊君何以服資衰三月也大夫去君騷其宗廟故服資衰三月也言與民同也何大夫之胃也言其以道去君而猶未絶也曾祖父母為士者如衆人何以也大夫不敢降其祖也女子嫁者未嫁者為曾祖父母傳曰嫁者其嫁於大夫者也未嫁者成人而未嫁者也何以服資衰三月也不敢降其祖也大功布衰常牡麻絰無綬者子女子之長中何以服大功也未成人也何以無綬也喪成人者其文儒喪未成人者其文不儒故喪之絰不漻垂蓋弗成也年十九至十六為長十五至十二為中十一至八歲為下不滿八歲以下皆為無服之以日易月日易月之而無服故子生三月則父命之死則哭之未命則弗哭也大功布衰常牡麻絰纓布帶三月受以小功衰葛九月者大功布九升小功布十一升姑姊妹女子適人者何以大功也出也為人後者為其昆弟何以大功也為人後者降其昆弟適婦何以服大功也不降其適也姪者何也胃我姑者吾謂之姪夫之祖父母世父母叔父母何以大功也從服也夫之昆弟何以無服也其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也胃弟之妻婦者是嫂亦可胃母也名者人治之大者也可毋慎乎大夫為世父母叔父母子昆弟之子為士者何以大功也尊不同也尊同則得服其親服公之庶昆弟大夫之庶子為母妻何以大功也先君之餘尊之所厭不得過大功大夫之子則從乎大夫而降也大夫之妾為君之庶子女子嫁者未嫁者為世父母叔父母姑姊妹傳曰嫁者其嫁於大夫者也未嫁者成人而未嫁者也何以大功也妾為君之黨服得與女君同君為姑姊妹女子嫁於國君者何以大功也尊同也尊同則得服其親服諸侯之子稱公子不得璽先君公子之子稱公孫不得祖諸侯此自卑別於尊者也若公子之子孫有封為國君者則世祖是人也不祖公子此自尊別於卑者也是故始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟封君之孫臣諸父昆弟故君之所為服子不敢不服也君之所不服子亦不敢服也繐衰常牡麻絰既葬除之者諸侯之大夫為天子何以也諸侯之大夫時妾見乎天子繐者小功之繐也小功布衰常澡麻帶絰五月者叔父之下從父昆弟之長問者曰中何以不見也大功之中從上小功之中從下小功布衰常即葛五月者外祖父母何以小功也以尊加也從母何以小功也以名加也親之服皆緦也夫之姑姊妹弟以婦報弟以婦者弟長也何以服小功也以為相與居室中則生小功之親焉君母之父母從母何以服小功也君母在則不敢不從服君母不在則不服君子為庶母慈己者君子者貴人子也為庶母何以服小功也以慈己加也緦麻三月者緦者十五升陶其半有事其縷無事其布曰緦庶子為後為其母何以緦也與尊者為體不敢服其私親也然則何以服緦也有死宮中者則為之三月不舉祭因是以服緦也士為庶母何以緦也以名服也貴臣貴妾何以緦也以其貴也乳母何以緦也以名服也從母昆弟何以緦也以名服也甥者何也胃我咎者吾胃之甥何以緦也報之也聟何以緦也報之也妻之父母何以緦也從服也姑之子何以緦也報之也咎何以緦也從服也咎之子何以緦也從服也君母之昆弟何以緦也從服也為妻之從父昆弟之妻何以緦也相與同室則生緦之親焉長中降一等下降二等資衰之中從上大功之中從下公子為其母練冠麻衣縓緣為其妻縓冠葛麻衣縓緣皆既葬除之何以不在五服之中也君之所不服子亦不敢服也君之所為服子不敢不服也不及知父母與兄弟居加一等何如則可胃兄弟傳曰小功以下為兄弟童子雖當室緦童子不當室則無緦服大夫弔於命婦錫衰命婦弔於大夫錫衰錫者何也麻有錫也錫者十五升陶其半無事其縷有事其布曰錫也女子適人者為父母婦為咎姑惡枅有首以卒哭子折枅首以枅有首者惡枅有首也惡枅者枅也子折枅首者折吉枅之首也吉枅者象枅也何以言子折枅首而不言婦也終之也
